backend:
  name: git-gateway
  branch: main

media_folder: "static/assets/images"
public_folder: "/assets/images"

publish_mode: editorial_workflow

# ─────────────────────────────────────────────────────────────────────
# YAML anchors: the field structure of each page section is identical
# across all five languages, so we define each section once and reuse
# the anchor in every language collection. Edit a section's field
# structure here, and it updates for every language automatically.
# ─────────────────────────────────────────────────────────────────────

