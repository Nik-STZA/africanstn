# Reusable field set: all 12 sections of a language file in display order.
# Used identically in each language collection below.
_lang_file_fields: &lang_file_fields
  - label: "Site chrome (rarely edited)"
    name: "meta"
    widget: "object"
    collapsed: true
    fields: *meta_fields
  - label: "Navigation"
    name: "nav"
    widget: "object"
    collapsed: true
    fields: *nav_fields
  - label: "Footer"
    name: "footer"
    widget: "object"
    collapsed: true
    fields: *footer_fields
  - label: "Cookie banner"
    name: "cookie"
    widget: "object"
    collapsed: true
    fields: *cookie_fields
  - label: "Browser tab titles"
    name: "page_titles"
    widget: "object"
    collapsed: true
    fields: *page_titles_fields
  - label: "Home page"
    name: "home"
    widget: "object"
    collapsed: false
    fields: *home_fields
  - label: "About page"
    name: "about"
    widget: "object"
    collapsed: true
    fields: *about_fields
  - label: "Services page"
    name: "services"
    widget: "object"
    collapsed: true
    fields: *services_fields
  - label: "Ecosystem page"
    name: "ecosystem"
    widget: "object"
    collapsed: true
    fields: *ecosystem_fields
  - label: "Contact page"
    name: "contact"
    widget: "object"
    collapsed: true
    fields: *contact_fields
  - label: "Join page"
    name: "join"
    widget: "object"
    collapsed: true
    fields: *join_fields
  - label: "What is sports tech page"
    name: "what"
    widget: "object"
    collapsed: true
    fields: *what_fields

# ─────────────────────────────────────────────────────────────────────
# COLLECTIONS — these are what shows in the CMS sidebar
# ─────────────────────────────────────────────────────────────────────

collections:

  # ── SITE SETTINGS ──────────────────────────────
  - name: "settings"
    label: "Site settings"
    files:
      - name: "site"
        label: "Global settings"
        file: "src/_data/site.json"
        fields:
          - { label: "Site name",            name: "site_name",        widget: "string" }
          - { label: "Short name",           name: "site_short",       widget: "string" }
          - { label: "Site URL",             name: "site_url",         widget: "string" }
          - { label: "Site description",     name: "site_description", widget: "text"   }
          - { label: "Footer tagline",       name: "footer_tagline",   widget: "text"   }
          - { label: "SA entity name",       name: "entity_sa",        widget: "string" }
          - { label: "SA company reg",       name: "reg_sa",           widget: "string" }
          - { label: "POPIA reg",            name: "popia_reg",        widget: "string" }
          - { label: "UK entity name",       name: "entity_uk",        widget: "string" }
          - { label: "Companies House",      name: "companies_house",  widget: "string" }
          - { label: "ICO number",           name: "ico_number",       widget: "string" }
          - { label: "STZA URL",             name: "stza_url",         widget: "string" }
          - { label: "Copyright year",       name: "copyright_year",   widget: "string" }

  # ── CONTENT (per language) ─────────────────────
  - name: "content_en"
    label: "Content — English"
    files:
      - name: "en"
        label: "All English content"
        file: "src/_data/i18n/en.json"
        fields: *lang_file_fields

  - name: "content_fr"
    label: "Content — Français (French)"
    files:
      - name: "fr"
        label: "All French content"
        file: "src/_data/i18n/fr.json"
        fields: *lang_file_fields

  - name: "content_pt"
    label: "Content — Português (Portuguese)"
    files:
      - name: "pt"
        label: "All Portuguese content"
        file: "src/_data/i18n/pt.json"
        fields: *lang_file_fields

  - name: "content_ar"
    label: "Content — العربية (Arabic)"
    files:
      - name: "ar"
        label: "All Arabic content"
        file: "src/_data/i18n/ar.json"
        fields: *lang_file_fields

  - name: "content_sw"
    label: "Content — Kiswahili (Swahili)"
    files:
      - name: "sw"
        label: "All Swahili content"
        file: "src/_data/i18n/sw.json"
        fields: *lang_file_fields

  # ── COMPANY DIRECTORY ──────────────────────────
  - name: "directory"
    label: "Company directory"
    label_singular: "Company"
    folder: "src/_data/companies"
    create: true
    slug: "{{fields.name | slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Company name", name: "name", widget: "string" }
      - label: "Country"
        name: "country"
        widget: "select"
        options: ["South Africa","Nigeria","Egypt","Kenya","Ghana","Ethiopia","Rwanda","Senegal","United Kingdom","United States","Australia","Other Africa","Other"]
      - label: "Sector"
        name: "sector"
        widget: "select"
        options: ["Performance technology","Fan engagement","Media & broadcast","eSports & gaming","Health & biotech","Analytics & data","Wearables & sensors","Venue technology","Compliance & legal","Investment & finance","Education & training","Ecosystem platform","Other"]
      - label: "Stage"
        name: "stage"
        widget: "select"
        options: ["Pre-revenue","Early stage","Growth","Scale-up","Established"]
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Featured on homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Logo", name: "logo", widget: "image", required: false }

  # ── INSIGHTS & BLOG ────────────────────────────
  - name: "posts"
    label: "Insights & news"
    label_singular: "Post"
    folder: "src/_data/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "URL slug", name: "slug", widget: "string", hint: "URL-friendly, e.g. africanstn-launches-2026" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentence summary shown in listings" }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["News","Insight","Research","Ecosystem","Compliance","Event"]
      - { label: "Cover image", name: "cover", widget: "image", required: false }
